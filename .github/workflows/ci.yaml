name: CI Suite
on: [push]

env:
  APP_ENV: ${{ vars.APP_ENV }}
  MLFLOW_DB_NAME: ${{ secrets.MLFLOW_DB_NAME }}
  MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.27"
          enable-cache: true
      
      - name: Install the deps
        run: uv sync --locked --all-extras --no-install-project

      - name: Run Linting
        run: >
          uv run ruff check .

      - name: Run Tests
        run: uv run pytest tests/

      - name: Build Docker
        run: docker compose -f docker/docker-compose.dev.yaml -d --build