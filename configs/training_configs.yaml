trainer_configs:
  task_type: "binary" # multiclass/binary/regression
  num_epochs: 5
  model_path: "path/to/your/model.pt" # Optional
  model_uri: "models:/SimpleModel/1" # Optional
  verbose: True
  binary_decision_threshold: 0.5
  learning_rate: 1e-3
  batch_size: 64
  early_stopping_patience: 5
  early_stopping_delta: 0.01
  lr_scheduler_gamma: 0.1
  lr_scheduler_step_size: 10

data_configs:
  dataset_path: "data/raw/binary_rawdata.csv"

